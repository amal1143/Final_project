<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        header {
            background: #198754;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .card {
            border-radius: 12px;
        }

        .btn-success {
            background: #198754;
            border: none;
        }

        .btn-success:hover {
            background: #157347;
        }
    </style>
</head>

<body>

<header>
    <h3>📦 Confirm Your Order</h3>
</header>

<div class="container mt-5">
    <div class="card shadow p-4 col-md-6 mx-auto">

        <!-- Product Image -->
        {% if order.product.image %}
        <img src="{{ order.product.image.url }}"
             class="img-fluid rounded mb-3"
             style="height:220px; object-fit:cover;">
        {% endif %}

        <!-- Order Details -->
        <p><strong>Product:</strong> {{ order.product.product_name }}</p>
        <p><strong>Price:</strong> ₹{{ order.product.price }}</p>
        <p><strong>Quantity:</strong> {{ order.quantity }}</p>

        <p class="fw-bold text-success fs-5">
            Total: ₹{{ order.total_amount }}
        </p>

        <hr>

        <!-- Delivery Form -->
        <form method="post">
            {% csrf_token %}

            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label fw-bold">Full Name</label>
                <input type="text"
                       name="name"
                       value="{{ customer.user.first_name|default:'' }}"
                       class="form-control"
                       placeholder="Enter your full name"
                       required>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label class="form-label fw-bold">Phone Number</label>
                <input type="text"
                       name="phone"
                       value="{{ customer.phone|default:'' }}"
                       class="form-control"
                       placeholder="Enter your phone number"
                       required>
            </div>

            <!-- Address -->
            <div class="mb-3">
                <label class="form-label fw-bold">Delivery Address</label>
                <textarea name="address"
                          rows="3"
                          class="form-control"
                          placeholder="Enter your full address"
                          required>{{ customer.address|default:'' }}</textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-success w-100">
                ✅ Proceed to Payment
            </button>
        </form>

        <!-- Cancel Button -->
        <a href="{% url 'customer_home' %}" class="btn btn-outline-secondary w-100 mt-2">
            ❌ Cancel
        </a>

    </div>
</div>

</body>
</html>
