{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Active Products</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI", Arial, sans-serif;
}

/* ===== BODY ===== */
body{
min-height:100vh;
background:linear-gradient(135deg,#e8f5e9,#f1f8e9);
}

/* ===== HEADER ===== */
header{
background:linear-gradient(90deg,#1b5e20,#2e7d32);
color:white;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

header h2{
font-size:22px;
}

header a{
color:white;
text-decoration:none;
font-weight:600;
background:rgba(255,255,255,0.2);
padding:8px 14px;
border-radius:8px;
transition:0.3s;
}

header a:hover{
background:white;
color:#1b5e20;
}

/* ===== CONTAINER ===== */
.container{
max-width:1100px;
margin:40px auto;
background:white;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* ===== TABLE ===== */
table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:12px;
}

th{
background:#2e7d32;
color:white;
padding:14px;
font-size:15px;
letter-spacing:0.5px;
}

td{
padding:14px;
text-align:center;
font-size:14px;
}

/* Zebra effect */
tr:nth-child(even){
background:#f9fbe7;
}

/* Hover effect */
tbody tr:hover{
background:#e8f5e9;
transform:scale(1.01);
transition:0.2s;
}

/* Empty row */
.empty{
padding:20px;
font-weight:600;
color:#777;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){

.container{
margin:20px;
padding:20px;
}

table, thead, tbody, th, td, tr{
display:block;
}

thead{
display:none;
}

tr{
margin-bottom:15px;
background:#f9fbe7;
border-radius:10px;
padding:10px;
}

td{
text-align:right;
padding-left:50%;
position:relative;
}

td::before{
content:attr(data-label);
position:absolute;
left:15px;
width:45%;
text-align:left;
font-weight:bold;
color:#1b5e20;
}

}

</style>
</head>

<body>

<header>
<h2>🧺 Active Products</h2>
<a href="{% url 'farmer_home' %}">⬅ Back</a>
</header>

<div class="container">

<table>
<thead>
<tr>
<th>Name</th>
<th>Price (₹)</th>
<th>Quantity</th>
</tr>
</thead>

<tbody>
{% for product in products %}
<tr>
<td data-label="Name">{{ product.product_name }}</td>
<td data-label="Price">₹{{ product.price }}</td>
<td data-label="Quantity">{{ product.quantity }}</td>
</tr>
{% empty %}
<tr>
<td colspan="3" class="empty">No active products available</td>
</tr>
{% endfor %}
</tbody>

</table>

</div>

</body>
</html>
