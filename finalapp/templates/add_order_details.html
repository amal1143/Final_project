<!DOCTYPE html>
<html>
<head>
    <title>Order Details</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        /* NAVBAR */
        header {
            background: #2563eb;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            margin: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
            background: rgba(255,255,255,0.15);
            padding: 8px 14px;
            border-radius: 6px;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.25);
        }

        /* BOX */
        .box {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        h3 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 12px;
            background: #6b7280;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<header>
    <h2>🧾 Order Details</h2>

    <div class="nav-links">
        <a href="{% url 'customer_home' %}">🏠 Home</a>
        <a href="{% url 'browse_products' %}">🛒 Browse Products</a>
        <a href="{% url 'my_orders' %}">📦 My Orders</a>
        <a href="{% url 'profile' %}">👤 Profile</a>
        <a href="{% url 'logout' %}">🚪 Logout</a>
    </div>
</header>

<div class="box">

    <h3>Confirm Your Order</h3>

    <p><strong>Product:</strong> {{ product.product_name }}</p>
    <p><strong>Price:</strong> ₹{{ product.price }}</p>
<form method="post">
    {% csrf_token %}

    <label>Quantity</label>
    <input type="number" name="quantity" min="1" required>

    <label>Pickup Date</label>
    <input type="date" name="pickup_date" required>

    
    <label>Pickup Address</label>
    <textarea name="pickup_address" rows="3" required 
        style="width:100%; padding:10px; margin-top:6px; resize:none;"></textarea>

    <button type="submit">Confirm Order</button>
</form>

    <a href="{% url 'browse_products' %}" class="back-btn">
        ⬅ Back
    </a>

</div>

</body>
</html>
