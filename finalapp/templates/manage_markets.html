<!DOCTYPE html>
<html>
<head>
    <title>Manage Markets</title>
    <style>
        /* ===== RESET ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #f4f6f9, #eef2f7);
            color: #333;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: linear-gradient(135deg, #1f2937, #2e5d2e);
            padding: 16px 34px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            box-shadow: 0 4px 18px rgba(0,0,0,.2);
        }

        .navbar h1 {
            font-size: 20px;
            letter-spacing: .5px;
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            margin-left: 22px;
            font-weight: 600;
            padding: 6px 10px;
            border-radius: 6px;
            transition: .25s;
        }

        .navbar a:hover {
            background: rgba(255,255,255,0.2);
        }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 920px;
            margin: 45px auto;
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 14px 35px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 22px;
            font-size: 22px;
            color: #1f2937;
        }

        /* ===== ADD MARKET FORM ===== */
        form.add-market {
            display: flex;
            gap: 14px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        form.add-market input {
            flex: 1;
            min-width: 220px;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
        }

        form.add-market input:focus {
            outline: none;
            border-color: #2e5d2e;
        }

        form.add-market button {
            padding: 12px 22px;
            background: #2e5d2e;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
        }

        form.add-market button:hover {
            background: #1f3d1f;
            transform: translateY(-2px);
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: #e5e7eb;
            padding: 14px;
            font-size: 14px;
            color: #111827;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr:hover {
            background: #f9fafb;
        }

        /* ===== DELETE BUTTON ===== */
        .delete-btn {
            background: #fee2e2;
            color: #b91c1c;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: .25s;
        }

        .delete-btn:hover {
            background: #fecaca;
        }

        /* ===== EMPTY STATE ===== */
        .empty {
            text-align: center;
            padding: 18px;
            color: #6b7280;
        }

        @media (max-width: 600px) {
            form.add-market {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
    <h1>Admin Dashboard</h1>
    <div>
        <a href="{% url 'admin_home' %}">Home</a>
        <a href="{% url 'admin_products' %}">Products</a>
        <a href="{% url 'manage_markets' %}">Markets</a>
        <a href="{% url 'view_farmers' %}">Farmers</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</div>

<!-- ===== CONTENT ===== -->
<div class="container">
    <h2>🏪 Manage Markets</h2>

    <!-- ADD MARKET -->
    <form action="{% url 'manage_markets' %}" method="post" class="add-market">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Market Name" required>
        <input type="text" name="location" placeholder="Location" required>
        <button type="submit">Add Market</button>
    </form>

    <!-- MARKET LIST -->
    <table>
        <tr>
            <th>#</th>
            <th>Market Name</th>
            <th>Location</th>
            <th>Action</th>
        </tr>

        {% for market in markets %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ market.name }}</td>
            <td>{{ market.location }}</td>
            <td>
                <form action="{% url 'delete_market' market.id %}" method="post">
                    {% csrf_token %}
                    <button type="submit"
                            class="delete-btn"
                            onclick="return confirm('Delete this market?')">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="empty">No markets created yet</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
