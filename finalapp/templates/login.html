{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== RESET ===== */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* ===== BODY WITH BACKGROUND IMAGE ===== */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    min-height: 100vh;

    background: url("{% static 'images/bg.png' %}") no-repeat center center fixed;
    background-size: cover;

    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== DARK OVERLAY ===== */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
    z-index: 0;
}

/* ===== NAVBAR ===== */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 16px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.6);
    z-index: 10;
}

.logo {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
}

.nav-links {
    display: flex;
    gap: 22px;
    align-items: center;
}

.nav-links a {
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.9;
}

.nav-links a:hover {
    opacity: 1;
    text-decoration: underline;
}

.contact {
    color: #88f5a1;
    font-weight: 600;
}

/* ===== LOGIN BOX ===== */
.login-box {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;

    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);

    padding: 35px 30px;
    border-radius: 20px;

    box-shadow: 0 20px 45px rgba(0,0,0,.25);

    animation: fadeUp .6s ease;
    margin-top: 80px;
}

/* ===== ANIMATION ===== */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== TITLE ===== */
.login-box h2 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 28px;
    color: #1b4332;
}

/* ===== FORM ===== */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* ===== INPUT ===== */
input {
    padding: 13px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
}

input:focus {
    outline: none;
    border-color: #2d6a4f;
    box-shadow: 0 0 6px rgba(45,106,79,.3);
}

/* ===== BUTTON ===== */
button {
    margin-top: 10px;
    padding: 14px;
    border: none;
    border-radius: 12px;

    background: linear-gradient(135deg, #2d6a4f, #40916c);

    color: white;
    font-size: 16px;
    font-weight: bold;

    cursor: pointer;
    transition: .3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,.3);
}

/* ===== FOOTER ===== */
.login-box p {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
}

.login-box a {
    color: #1b4332;
    font-weight: bold;
    text-decoration: none;
}

.login-box a:hover {
    text-decoration: underline;
}

/* ===== MOBILE ===== */
@media (max-width: 480px) {
    .login-box {
        margin: 20px;
        padding: 25px;
    }

    .navbar {
        padding: 14px 20px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🌾 FARMERS MARKET</div>

    <div class="nav-links">
        <a href="{% url 'homepage' %}">Home</a>
        <a href="{% url 'about' %}">About</a>
        <span class="contact">📞 +91 98765 43210</span>
        <a href="{% url 'register' %}">Register</a>
    </div>
</div>

<!-- LOGIN BOX -->
<div class="login-box">

    <h2>Login</h2>

    <form action="{% url 'login' %}" method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <p>
        New user?
        <a href="{% url 'register' %}">Register here</a>
    </p>

</div>

</body>
</html>
