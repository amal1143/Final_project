<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        header {
            background: #16a34a;
            color: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .success-box {
            background: #ecfdf5;
            border: 1px solid #10b981;
            color: #065f46;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            text-transform: capitalize;
        }

        .paid, .confirmed, .completed { background: #10b981; }
        .pending { background: #fbbf24; }
        .cancelled { background: #ef4444; }

        .btn {
            display: inline-block;
            margin-top: 20px;
            background: #2563eb;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<header>
    <h2>✅ Order Status</h2>
    <a href="{% url 'customer_home' %}">Back</a>
</header>

<div class="container">
    <div class="card">

        <div class="success-box">
            🎉 Payment Successful! Your order is confirmed.
        </div>

        <div class="row">
            <div><strong>Order ID</strong></div>
            <div>#{{ order.id }}</div>
        </div>

        <div class="row">
            <div><strong>Product</strong></div>
            <div>{{ order.product.product_name }}</div>
        </div>

        <div class="row">
            <div><strong>Quantity</strong></div>
            <div>{{ order.quantity }}</div>
        </div>

        <div class="row">
            <div><strong>Total</strong></div>
            <div>₹{{ order.total_amount }}</div>
        </div>

        <div class="row">
            <div><strong>Status</strong></div>
            <div>
                <span class="status {{ order.status }}">
                    {{ order.status }}
                </span>
            </div>
        </div>

        <a href="{% url 'my_orders' %}" class="btn">
            View My Orders
        </a>

    </div>
</div>

</body>
</html>
