{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== THEME VARIABLES ===== */
:root {
    --green-dark: #2e5d2e;
    --green-light: #3b7a3b;
    --bg-main: linear-gradient(135deg, #eef5f1, #e3eee8);
    --card-bg: #ffffff;
    --radius-lg: 22px;
    --radius-md: 14px;
    --shadow-soft: 0 12px 30px rgba(0,0,0,.12);
    --shadow-hover: 0 16px 36px rgba(0,0,0,.18);
}

/* ===== RESET ===== */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* ===== BODY (CHANGED BACKGROUND COLOR) ===== */
body {
    font-family: "Segoe UI", Arial, sans-serif;
    min-height: 100vh;
    background: var(--bg-main);
}

/* ===== NAVBAR ===== */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 34px;
    background: linear-gradient(90deg, var(--green-dark), var(--green-light));
    color: white;
    box-shadow: 0 4px 14px rgba(0,0,0,.18);
}

.navbar div {
    font-size: 21px;
    font-weight: 700;
}

.navbar ul {
    list-style: none;
    display: flex;
    gap: 22px;
}

.navbar a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 10px;
    transition: .25s ease;
}

.navbar a:hover {
    background: rgba(255,255,255,0.22);
}

.logout-btn {
    background:#e76f51;
    font-weight:600;
}

.logout-btn:hover {
    background:#d65a3c;
}

/* ===== FORM CARD ===== */
.container {
    max-width: 560px;
    margin: 64px auto;
    padding: 36px 34px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
    animation: fadeUp .6s ease;
}

@keyframes fadeUp {
    from { opacity:0; transform: translateY(24px); }
    to { opacity:1; transform: translateY(0); }
}

/* ===== HEADING ===== */
h2 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 6px;
}

.subtitle {
    text-align: center;
    color: #666;
    font-size: 14px;
    margin-bottom: 26px;
}

/* ===== FORM LAYOUT ===== */
form {
    display: grid;
    gap: 14px;
}

label {
    font-weight: 600;
    font-size: 14px;
}

/* ===== INPUTS ===== */
input, textarea, select {
    width: 100%;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    border: 1px solid #ccc;
    font-size: 15px;
    transition: .25s ease;
    background: #fff;
}

input:focus,
textarea:focus,
select:focus {
    outline: none;
    border-color: var(--green-dark);
    box-shadow: 0 0 0 3px rgba(46,93,46,.18);
}

/* ===== TEXTAREA ===== */
textarea {
    resize: none;
    height: 96px;
}

/* ===== FILE INPUT ===== */
input[type="file"] {
    padding: 12px;
    background: #fafafa;
    border: 2px dashed #cfcfcf;
    cursor: pointer;
}

input[type="file"]::file-selector-button {
    background: var(--green-dark);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    margin-right: 10px;
    cursor: pointer;
}

input[type="file"]::file-selector-button:hover {
    background: var(--green-light);
}

/* ===== BUTTON ===== */
button {
    margin-top: 8px;
    padding: 15px;
    background: linear-gradient(135deg, var(--green-dark), var(--green-light));
    color: white;
    border: none;
    border-radius: 16px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: .3s ease;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
}

/* ===== ERROR MESSAGE ===== */
.error {
    background: #ffe5e5;
    color: #c62828;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
    .container {
        margin: 40px 16px;
        padding: 28px 22px;
    }
    .navbar {
        flex-direction: column;
        gap: 12px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div>🌱 Farmer Panel</div>
    <ul>
        <li><a href="{% url 'farmer_home' %}">Dashboard</a></li>
        <li><a href="{% url 'view_products' %}">My Products</a></li>
        <li><a href="{% url 'logout' %}" class="logout-btn">Logout</a></li>
    </ul>
</nav>

<!-- FORM CARD -->
<div class="container">
<h2>Add Product</h2>
<p class="subtitle">Enter fresh produce details for marketplace listing</p>

{% if messages %}
    {% for message in messages %}
        <div class="error">{{ message }}</div>
    {% endfor %}
{% endif %}

<form method="post" enctype="multipart/form-data" action="{% url 'addproduct' %}">
    {% csrf_token %}

    <label>Product Name</label>
    <input type="text" name="product_name" placeholder="Organic Tomato" required>

    <label>Category</label>
    <select name="category" required>
        <option value="">Select Category</option>
        <option>Vegetables</option>
        <option>Fruits</option>
        <option>Grains</option>
    </select>

    <label>Price (₹)</label>
    <input type="number" name="price" required>

    <label>Quantity</label>
    <input type="number" name="quantity" required>

    <label>Description</label>
    <textarea name="description"></textarea>

    <label>Product Image</label>
    <input type="file" name="image">

    <button type="submit">➕ Add Product</button>
</form>
</div>

</body>
</html>
