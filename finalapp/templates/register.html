{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* ===== BODY WITH BACKGROUND IMAGE ===== */
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: url("{% static 'images/bg.png' %}") no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== DARK OVERLAY ===== */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
    z-index: 0;
}

/* ===== NAVBAR ===== */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 16px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.6);
    z-index: 10;
}

.logo {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
}

.nav-links {
    display: flex;
    gap: 22px;
    align-items: center;
}

.nav-links a {
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.9;
}

.nav-links a:hover {
    opacity: 1;
    text-decoration: underline;
}

.contact {
    color: #88f5a1;
    font-weight: 600;
}

/* ===== REGISTER BOX (GLASS EFFECT) ===== */
.register-box {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;

    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(10px);

    padding: 35px 30px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);

    margin-top: 90px;
}

/* ===== TITLE ===== */
.register-box h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #1f4d3b;
    font-size: 26px;
}

/* ===== FORM ===== */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* ===== INPUT ===== */
input, select {
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus, select:focus {
    outline: none;
    border-color: #1f4d3b;
    box-shadow: 0 0 5px rgba(31,77,59,0.3);
}

/* ===== BUTTON ===== */
button {
    padding: 13px;
    border: none;
    border-radius: 8px;
    background-color: #1f4d3b;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background-color: #163b2e;
}

/* ===== FOOTER ===== */
.register-box p {
    text-align: center;
    margin-top: 18px;
}

.register-box a {
    color: #1f4d3b;
    text-decoration: none;
    font-weight: bold;
}

.register-box a:hover {
    text-decoration: underline;
}

/* ===== MOBILE ===== */
@media(max-width:480px){
    .register-box{
        margin:20px;
        padding:25px;
    }

    .navbar {
        padding: 14px 20px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🌾 FARMERS MARKET</div>

    <div class="nav-links">
        <a href="{% url 'homepage' %}">Home</a>
        <a href="{% url 'about' %}">About</a>
        <span class="contact">📞 +91 98765 43210</span>
        <a href="{% url 'login' %}">Login</a>
    </div>
</div>

<!-- REGISTER BOX -->
<div class="register-box">

    <h2>User Registration</h2>

    <form action="{% url 'register' %}" method="post">
        {% csrf_token %}

        <input type="text" name="full_name" placeholder="Full Name" required>
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="text" name="phone" placeholder="Phone Number" required>

        <select name="role" required>
            <option value="">Select Role</option>
            <option value="farmer">Farmer</option>
            <option value="consumer">Consumer</option>
        </select>

        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        <button type="submit">Create Account</button>
    </form>

    <p>
        Already registered?
        <a href="{% url 'login' %}">Login here</a>
    </p>

</div>

</body>
</html>
