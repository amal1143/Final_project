{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Market</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body{
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card{
            background: #ffffff;
            width: 420px;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.15);
            text-align: center;
            animation: fadeIn .6s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .market-img{
            width: 100%;
            height: 200px;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h2{
            font-size: 22px;
            margin-bottom: 8px;
            color: #111827;
        }

        p{
            font-size: 15px;
            color: #374151;
        }

        .warning{
            color: #dc2626;
            font-weight: 600;
            margin-top: 12px;
        }

        .btn{
            display: inline-block;
            margin-top: 22px;
            background: #2563eb;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: .3s;
        }

        .btn:hover{
            background: #1d4ed8;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<div class="card">

    {% if market %}
        <img src="{% static 'images/market.jpg' %}" class="market-img" alt="Market">
        <h2>🏪 {{ market.name }}</h2>
        <p>📍 {{ market.location }}</p>
    {% else %}
        <img src="{% static 'images/no-market.jpg' %}" class="market-img" alt="No Market">
        <h2 class="warning">No Market Assigned</h2>
        <p>Please contact admin to assign a market.</p>
    {% endif %}

    <a href="{% url 'farmer_home' %}" class="btn">⬅ Back to Dashboard</a>

</div>

</body>
</html>
