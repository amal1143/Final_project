<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup Bookings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        /* ===== HEADER ===== */
        .header {
            background: #2563eb;
            color: white;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .header a {
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
        }

        .header a:hover {
            background: rgba(255,255,255,0.25);
        }

        /* ===== CONTENT ===== */
        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 50px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .card h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #111827;
        }

        .card p {
            color: #6b7280;
            font-size: 16px;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            background: #f9fafb;
            font-weight: 600;
        }

        .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
        }

        .status.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status.completed {
            background: #dcfce7;
            color: #166534;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h2>📍 Pickup Bookings</h2>
        <a href="javascript:history.back()">Back</a>
    </div>

    <!-- CONTENT -->
    <div class="container">

        {% if bookings %}
            <div class="card" style="padding: 0;">
                <table>
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Pickup Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for booking in bookings %}
                        <tr>
                            <td>#{{ booking.id }}</td>
                            <td>{{ booking.pickup_date }}</td>
                            <td>
                                <span class="status {{ booking.status }}">
                                    {{ booking.status|title }}
                                </span>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        {% else %}
            <div class="card">
                <h3>No Pickup Bookings</h3>
                <p>Your pickup schedules will appear here after payment.</p>
            </div>
        {% endif %}

    </div>

</body>
</html>
