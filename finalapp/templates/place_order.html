{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f4f6f9;
        }

        /* HEADER */
        header {
            background: #2563eb;
            color: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 14px;
            border-radius: 8px;
        }

        /* CONTAINER */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .order-card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* IMAGE */
        .image-box {
            height: 260px;
            background: #eee;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* BODY */
        .order-body {
            padding: 24px;
        }

        h2 {
            margin-bottom: 8px;
        }

        .farmer {
            color: #6b7280;
            margin-bottom: 12px;
        }

        .price {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .total {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            background: #16a34a;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #15803d;
        }
    </style>
</head>

<body>

<header>
    <h2>🛒 Place Order</h2>
    <a href="{% url 'customer_markets' %}">⬅ Back</a>
</header>

<div class="container">

<form method="post">
{% csrf_token %}

<div class="order-card">

    <!-- PRODUCT IMAGE -->
    <div class="image-box">
        {% if product.image %}
            <img src="{{ product.image.url }}">
        {% else %}
            <img src="{% static 'images/default.png' %}">
        {% endif %}
    </div>

    <!-- DETAILS -->
    <div class="order-body">
        <h2>{{ product.name }}</h2>
        <p class="farmer">👨‍🌾 Farmer: {{ product.farmer.user.first_name }}</p>
        <p class="price">₹ {{ product.price }} per unit</p>

        <label>Quantity</label>
        <input type="number" name="quantity" min="1" required>

        <label>Pickup Date</label>
        <input type="date" name="pickup_date" required>

        <p class="total">
            💰 Total Amount: ₹ <span id="total">0</span>
        </p>

        <button type="submit">Confirm Order</button>
    </div>

</div>

</form>

</div>

<script>
    const price = Number("{{ product.price }}");
    const qtyInput = document.querySelector('input[name="quantity"]');
    const totalSpan = document.getElementById("total");

    qtyInput.addEventListener("input", () => {
        const qty = qtyInput.value || 0;
        totalSpan.innerText = qty * price;
    });
</script>


</body>
</html>
